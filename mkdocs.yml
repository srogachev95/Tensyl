site_name: Tensyl
site_description: Equivalent-stiffness homogenization tools for stiffened plates and shells.
repo_url: https://github.com/srogachev95/Tensyl
docs_dir: docs
strict: true
theme: readthedocs
exclude_docs: |
  internal/**
  llm_wiki/**
markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.arithmatex:
      generic: true
extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths:
            - src
          options:
            docstring_style: google
            show_if_no_docstring: true
            show_source: false
            inherited_members: true
nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - First ABD Stiffness: getting-started/first-abd-stiffness.md
      - First Homogenized Cell: getting-started/first-homogenized-cell.md
  - Background:
      - Motivation: background/motivation.md
      - Brief History: background/history.md
      - Terminology: background/terminology.md
  - Theory:
      - Equivalent-Stiffness Mechanics: theory/equivalent-stiffness.md
      - Frames and Conventions: theory/conventions.md
      - Tangent-Plane Homogenization: theory/tangent-plane-homogenization.md
      - Validity Limits: theory/validity.md
  - User Guide:
      - Units and Consistency: user-guide/units-and-consistency.md
      - Materials and Laminates: user-guide/materials-and-laminates.md
      - Beam Sections and Cells: user-guide/beam-sections-and-cells.md
      - Homogenization: user-guide/homogenization.md
      - Result Interpretation: user-guide/result-interpretation.md
      - Geometry and Stiffness Fields: user-guide/geometry-and-fields.md
      - Stiffened Surfaces: user-guide/stiffened-surfaces.md
      - External Workflows: user-guide/external-workflows.md
      - SP-8007 Data Handoff: user-guide/sp8007-data-handoff.md
      - SP-8007 Data Prep: user-guide/sp8007-data-prep.md
  - Examples:
      - Skin-Only ABD Stiffness: examples/skin-only.md
      - Laminate Skin ABD Stiffness: examples/laminate-skin.md
      - Orthogrid Panel ABD Stiffness: examples/orthogrid-panel.md
      - Stiffened Barrel With Constant Stiffness: examples/stiffened-barrel.md
      - Sampled Stiffness Atlas: examples/sampled-stiffness-atlas.md
      - Non-Constant Homogenized Stiffness Field: examples/non-constant-stiffness-field.md
  - API Reference:
      - Core: api/core.md
      - Materials: api/materials.md
      - Cells and Sections: api/cells-and-sections.md
      - Homogenizers: api/homogenizers.md
      - Geometry and Fields: api/geometry-and-fields.md
      - External Workflow I/O: api/io.md
  - References: references.md

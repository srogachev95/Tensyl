schema_version: tensyl.validation.local_abd.case.v1
case_type: local_abd_periodic_cell
case_id: local_abd_unidirectional
name: local_abd_unidirectional
title: Zero-eccentric unidirectional stiffener family
phase: phase_1_local_abd
status:
  current_runner: tensyl_target_executable
  command: uv run python validation/scripts/run_case.py validation/cases/local_abd/unidirectional.yml
  solver_runner: planned
  artifact_promotion: draft
units:
  length: in
  force: lbf
  stress: psi
materials:
  aluminum:
    E: 10600000.0
    nu: 0.33
    density: 0.1
skin:
  material: aluminum
  thickness: 0.08
  shear_correction: 0.8333333333333334
section_library:
  validation_hat_equivalent:
    type: beam_section
    EA: 3200000.0
    EIy: 24000.0
    EIz: 6500.0
    GJ: 4000.0
    kGAy: 1100000.0
    kGAz: 900000.0
local_frame:
  e1: stiffener_axis
  e2: transverse_pitch_direction
  normal: skin_positive_z
  handedness: e1_cross_e2_equals_normal
reference_surface:
  location: skin_midsurface
  z_offset: 0.0
cell:
  topology: unidirectional
  constructor: unidirectional_cell
  arguments:
    member_section: validation_hat_equivalent
    spacing: 6.0
    eccentricity: 0.0
    angle_rad: 0.0
  representative_area: 6.0
  boundary_condition: generalized_strain_periodic
tensyl_reference:
  constructor: EnergyHomogenizer.compute
  cell_constructor: unidirectional_cell
  comparison_frame: local_frame
fe_model:
  runner_status: planned
  solver: CalculiX
  mesh_generator: Gmsh
  element_family: skin_shells_with_beam_or_shell_stiffener
  nominal_element_size: 0.25
extraction:
  generalized_strain_order:
    - epsilon_11
    - epsilon_22
    - gamma_12
    - kappa_11
    - kappa_22
    - kappa_12
    - gamma_13
    - gamma_23
  load_cases:
    - id: epsilon_11
      component: epsilon_11
      magnitude: 0.0001
    - id: epsilon_22
      component: epsilon_22
      magnitude: 0.0001
    - id: gamma_12
      component: gamma_12
      magnitude: 0.0001
    - id: kappa_11
      component: kappa_11
      magnitude: 0.001
      units: 1/in
    - id: kappa_22
      component: kappa_22
      magnitude: 0.001
      units: 1/in
    - id: kappa_12
      component: kappa_12
      magnitude: 0.001
      units: 1/in
    - id: gamma_13
      component: gamma_13
      magnitude: 0.0001
    - id: gamma_23
      component: gamma_23
      magnitude: 0.0001
expected_metrics:
  oracle: tensyl_energy_homogenizer
  blocks:
    A: lbf_per_in
    B: lbf
    D: lbf_in
    As: lbf_per_in
  tolerances:
    block_relative_linf: 0.02
    energy_relative_linf: 0.02
    symmetry_absolute_linf: 1.0e-7
  invariants:
    - B block is zero within tolerance because the member centroid is on the reference surface.
    - A11 exceeds the skin-only A11 value.
    - A11 exceeds A22.
    - Coupling terms that violate one-family mirror symmetry remain zero within tolerance.
promotion:
  scratch:
    - Solver-backed runner completes all eight extraction load cases.
    - Metrics and manifest are written under validation/artifacts/scratch/local_abd/unidirectional/.
  committed:
    - Curated metrics, manifest, and mesh-convergence summary are copied under validation/artifacts/committed/local_abd/unidirectional/.
    - Deviations from the Tensyl reference are recorded before the case is used as a regression baseline.

    - epsilon_22
    - gamma_12
    - kappa_11
    - kappa_22
    - kappa_12
    - gamma_13
    - gamma_23
  load_cases:
    - id: epsilon_11
      component: epsilon_11
      magnitude: 0.0001
    - id: epsilon_22
      component: epsilon_22
      magnitude: 0.0001
    - id: gamma_12
      component: gamma_12
      magnitude: 0.0001
    - id: kappa_11
      component: kappa_11
      magnitude: 0.001
      units: 1/in
    - id: kappa_22
      component: kappa_22
      magnitude: 0.001
      units: 1/in
    - id: kappa_12
      component: kappa_12
      magnitude: 0.001
      units: 1/in
    - id: gamma_13
      component: gamma_13
      magnitude: 0.0001
    - id: gamma_23
      component: gamma_23
      magnitude: 0.0001
expected_metrics:
  oracle: tensyl_energy_homogenizer
  blocks:
    A: lbf_per_in
    B: lbf
    D: lbf_in
    As: lbf_per_in
  tolerances:
    block_relative_linf: 0.02
    energy_relative_linf: 0.02
    symmetry_absolute_linf: 1.0e-7
  invariants:
    - B block is zero within tolerance because both stiffener centroids are on the reference surface.
    - A11 exceeds the skin-only A11 value.
    - A22 exceeds the skin-only A22 value.
    - Stringer and rib axes align with local e1 and e2.
promotion:
  scratch:
    - Solver-backed runner completes all eight extraction load cases.
    - Metrics and manifest are written under validation/artifacts/scratch/local_abd/orthogrid_zero_eccentricity/.
  committed:
    - Curated metrics, manifest, and mesh-convergence summary are copied under validation/artifacts/committed/local_abd/orthogrid_zero_eccentricity/.
    - The committed summary confirms that membrane-bending coupling remains negligible.

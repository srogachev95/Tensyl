<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" role="img" aria-labelledby="title desc">
<title id="title">blade_section geometry</title>
<desc id="desc">A blade web rises in positive z from the skin-face construction datum.</desc>
<defs>
<linearGradient id="wall-fill" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#dbeafe"/>
<stop offset="100%" stop-color="#bfdbfe"/>
</linearGradient>
<filter id="wall-shadow" x="-20%" y="-20%" width="140%" height="150%">
<feDropShadow dx="0" dy="1.2" stdDeviation="1.4" flood-color="#0f172a" flood-opacity="0.18"/>
</filter>
<pattern id="skin-hatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
<rect width="8" height="8" fill="#f8fafc"/>
<line x1="0" y1="0" x2="0" y2="8" stroke="#cbd5e1" stroke-width="2"/>
</pattern>
<marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
</marker>
</defs>
<rect x="0" y="0" width="760" height="470" fill="#ffffff"/>
<text x="28" y="32" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="20" font-weight="760" letter-spacing="0" fill="#0f172a">blade_section geometry</text>
<text x="28" y="54" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="12.5" fill="#475569">A blade web rises in positive z from the skin-face construction datum.</text>

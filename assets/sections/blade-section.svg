<line x1="580.00" y1="172.00" x2="602.00" y2="172.00" stroke="#0f172a" stroke-width="1.3" stroke-dasharray="6 5"/>
<text x="610.00" y="176.00" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="11.5" fill="#334155">z = 0 datum</text>
<rect x="28" y="422.00" width="704" height="32" rx="5" fill="#f8fafc" stroke="#cbd5e1"/>

<text x="44" y="443.00" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="12.5" fill="#334155">Web root touches z = 0; centroid_z is measured upward from that datum.</text>
</svg>

<text x="60.00" y="281.00" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="12" fill="#334155">+z / +n</text>
<polygon points="311.15,308.66 311.15,125.05 330.66,125.05 330.66,308.66" fill="url(#wall-fill)" stroke="#2563eb" stroke-width="1.8" stroke-linejoin="round" filter="url(#wall-shadow)"/>

<text x="542.00" y="349.75" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="12" fill="#64748b">skin reference surface</text>
<line x1="52.00" y1="340.00" x2="110.00" y2="340.00" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 470" role="img" aria-labelledby="title desc">
<title id="title">thin_wall_section segment coordinates</title>
<desc id="desc">A custom thin-wall segment is defined by midline endpoints and thickness.</desc>
<defs>
<linearGradient id="wall-fill" x1="0" y1="0" x2="0" y2="1">
<stop offset="0%" stop-color="#dbeafe"/>
<stop offset="100%" stop-color="#bfdbfe"/>
</linearGradient>
<filter id="wall-shadow" x="-20%" y="-20%" width="140%" height="150%">
<feDropShadow dx="0" dy="1.2" stdDeviation="1.4" flood-color="#0f172a" flood-opacity="0.18"/>
</filter>
<pattern id="skin-hatch" width="8" height="8" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
<rect width="8" height="8" fill="#f8fafc"/>
<line x1="0" y1="0" x2="0" y2="8" stroke="#cbd5e1" stroke-width="2"/>
</pattern>
<marker id="arrow" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
</marker>
</defs>
<rect x="0" y="0" width="760" height="470" fill="#ffffff"/>
<text x="28" y="32" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="20" font-weight="760" letter-spacing="0" fill="#0f172a">thin_wall_section segment coordinates</text>
<text x="28" y="54" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="12.5" fill="#475569">A custom thin-wall segment is defined by midline endpoints and thickness.</text>
<rect x="28.00" y="297.11" width="704.00" height="29.74" fill="url(#skin-hatch)" stroke="#cbd5e1" stroke-width="0.8"/>
<line x1="28.00" y1="297.11" x2="732.00" y2="297.11" stroke="#0f172a" stroke-width="1.5" stroke-dasharray="6 5"/>
<line x1="28.00" y1="311.98" x2="732.00" y2="311.98" stroke="#64748b" stroke-width="1.2" stroke-dasharray="3 5"/>
<text x="542.00" y="275.11" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="12" fill="#334155">section datum z = 0 / skin face</text>
<text x="542.00" y="343.85" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="12" fill="#64748b">skin reference surface</text>
<line x1="52.00" y1="340.00" x2="110.00" y2="340.00" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
<line x1="52.00" y1="340.00" x2="52.00" y2="286.00" stroke="#334155" stroke-width="1.6" marker-end="url(#arrow)"/>
<text x="119.00" y="344.00" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="12" fill="#334155">+y</text>
<text x="60.00" y="281.00" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="12" fill="#334155">+z / +n</text>
<polygon points="222.81,254.54 385.65,123.57 397.19,137.91 234.35,268.89" fill="url(#wall-fill)" stroke="#2563eb" stroke-width="1.8" stroke-linejoin="round" filter="url(#wall-shadow)"/>
<line x1="228.58" y1="261.72" x2="391.42" y2="130.74" stroke="#1d4ed8" stroke-width="1" stroke-dasharray="4 4" opacity="0.55"/>
<line x1="228.58" y1="261.72" x2="213.50" y2="242.96" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/>
<line x1="391.42" y1="130.74" x2="376.33" y2="111.98" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/>
<line x1="213.50" y1="242.96" x2="376.33" y2="111.98" stroke="#475569" stroke-width="1.3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text x="294.91" y="169.47" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="12" text-anchor="middle" fill="#334155">segment midline length</text>
<line x1="320.62" y1="181.01" x2="307.96" y2="191.25" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3 3"/>

<line x1="307.96" y1="191.25" x2="320.00" y2="206.12" stroke="#475569" stroke-width="1.3" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
<text x="285.98" y="190.69" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="12" text-anchor="end" fill="#334155">thickness</text>
<circle cx="310.00" cy="196.23" r="7.2" fill="#ffffff" stroke="#dc2626" stroke-width="1.2"/>
<circle cx="310.00" cy="196.23" r="4.3" fill="#dc2626"/>
<line x1="300.00" y1="196.23" x2="320.00" y2="196.23" stroke="#dc2626" stroke-width="1.2"/>
<line x1="310.00" y1="186.23" x2="310.00" y2="206.23" stroke="#dc2626" stroke-width="1.2"/>
<text x="326.99" y="216.05" transform="rotate(38.0 326.99 216.05)" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="11.5" text-anchor="middle" dominant-baseline="middle" fill="#1e3a8a">segment</text>
<rect x="566.00" y="78.00" width="166" height="104" rx="5" fill="#ffffff" stroke="#cbd5e1"/>
<text x="580.00" y="100.00" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="12" font-weight="700" fill="#0f172a">Legend</text>
<rect x="580.00" y="112.00" width="22" height="10" fill="url(#wall-fill)" stroke="#2563eb" stroke-width="1"/>
<text x="610.00" y="122.00" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="11.5" fill="#334155">section wall</text>
<line x1="580.00" y1="136.00" x2="602.00" y2="136.00" stroke="#1d4ed8" stroke-width="1" stroke-dasharray="4 4" opacity="0.7"/>
<text x="610.00" y="140.00" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="11.5" fill="#334155">segment midline</text>
<circle cx="591.00" cy="154.00" r="4" fill="#dc2626"/>
<text x="610.00" y="158.00" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="11.5" fill="#334155">computed centroid</text>
<line x1="580.00" y1="172.00" x2="602.00" y2="172.00" stroke="#0f172a" stroke-width="1.3" stroke-dasharray="6 5"/>
<text x="610.00" y="176.00" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="11.5" fill="#334155">z = 0 datum</text>
<rect x="28" y="422.00" width="704" height="32" rx="5" fill="#f8fafc" stroke="#cbd5e1"/>
<rect x="28" y="422.00" width="4" height="32" rx="2" fill="#2563eb"/>
<text x="44" y="443.00" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="12.5" fill="#334155">start_y/start_z and end_y/end_z are midline endpoints.</text>
</svg>

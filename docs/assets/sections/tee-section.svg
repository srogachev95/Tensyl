<text x="28" y="54" font-family="Inter, Arial, sans-serif" paint-order="stroke" stroke="#ffffff" stroke-width="3" stroke-linejoin="round" font-size="12.5" fill="#475569">A tee section has a web rooted at z = 0 and a flange above the web.</text>
